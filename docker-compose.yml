version: "3.9"

services:
  # ── Nginx Reverse Proxy ─────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api

  # ── Certbot (SSL) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt

  # ── PostgreSQL ──────────────────────────────────────
  db:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: viraly
      POSTGRES_USER: viraly
      POSTGRES_PASSWORD: viraly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viraly -d viraly"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AI Service (FastAPI) ────────────────────────────
  ai:
    build:
      context: .
      dockerfile: apps/ai/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      AI_PROVIDER_URL: ${AI_PROVIDER_URL:-https://api.openai.com/v1/chat/completions}
      AI_PROVIDER_KEY: ${AI_PROVIDER_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}

  # ── API Server (Express) ────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-viraly-docker-secret-change-in-prod}
      DATABASE_URL: postgresql://viraly:viraly@db:5432/viraly
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai:
        condition: service_started

  # ── Frontend (Next.js) ──────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api

volumes:
  pgdata:
